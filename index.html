<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지? - 메뉴 추천 챗봇</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --primary: #5b5bd6;
      --primary-dark: #4545b5;
      --text: #202124;
      --muted: #737584;
      --bot: #eef0ff;
      --user: #5b5bd6;
      --border: #e6e7ef;
      --shadow: 0 16px 40px rgba(33, 36, 50, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: Pretendard, "Noto Sans KR", -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #ececff 0, transparent 35%),
        radial-gradient(circle at bottom right, #fff0dc 0, transparent 35%),
        var(--bg);
    }

    .app {
      width: min(100%, 820px);
      height: min(92vh, 850px);
      min-height: 650px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 26px;
      background: linear-gradient(135deg, #5b5bd6, #8f8fff);
      border-radius: 15px;
      box-shadow: 0 8px 18px rgba(91, 91, 214, 0.25);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 19px;
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .count-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 2px 7px;
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 800;
      background: #ededff;
      border-radius: 999px;
    }

    .reset-btn {
      margin-left: auto;
      padding: 9px 12px;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 11px;
    }

    .reset-btn:hover {
      color: var(--primary);
      border-color: #c8c8f5;
    }

    .meal-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }

    .meal-tabs::-webkit-scrollbar { display: none; }

    .meal-tabs button,
    .quick-replies button {
      flex-shrink: 0;
      padding: 8px 12px;
      color: #4d4fb0;
      font-weight: 750;
      cursor: pointer;
      background: #fff;
      border: 1px solid #d9daf2;
      border-radius: 999px;
      transition: 0.15s ease;
    }

    .meal-tabs button:hover,
    .quick-replies button:hover {
      background: #f4f4ff;
      border-color: #bfc0ef;
      transform: translateY(-1px);
    }

    .chat {
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
      background:
        linear-gradient(rgba(255,255,255,.86), rgba(255,255,255,.86)),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 29px,
          rgba(91,91,214,.025) 30px
        );
    }

    .message-row {
      display: flex;
      margin-bottom: 13px;
      animation: pop .2s ease-out;
    }

    .message-row.user { justify-content: flex-end; }

    .message {
      max-width: min(88%, 620px);
      padding: 12px 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: keep-all;
      border-radius: 17px;
      font-size: 15px;
    }

    .message.bot {
      background: var(--bot);
      border-bottom-left-radius: 5px;
    }

    .message.user {
      color: white;
      background: var(--user);
      border-bottom-right-radius: 5px;
    }

    .menu-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .menu-card {
      padding: 14px;
      background: #fff;
      border: 1px solid #dfe2ff;
      border-radius: 14px;
    }

    .menu-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--primary-dark);
      font-size: 17px;
    }

    .menu-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .tag {
      padding: 3px 7px;
      color: #595a69;
      font-size: 11px;
      background: #f4f4f8;
      border-radius: 999px;
    }

    .matched {
      margin-top: 9px;
      color: #5052af;
      font-size: 12px;
      font-weight: 700;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 5px 0 16px;
    }

    .composer {
      padding: 14px;
      background: #fff;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 7px 7px 15px;
      background: #fafaff;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    input {
      flex: 1;
      min-width: 0;
      color: var(--text);
      font-size: 15px;
      background: transparent;
      border: 0;
      outline: 0;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: var(--primary);
      border: 0;
      border-radius: 13px;
    }

    .send-btn:hover { background: var(--primary-dark); }

    .hint {
      margin: 8px 3px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 0; }
      .app {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }
      header { padding: 14px; }
      .chat { padding: 16px 13px; }
      .message { max-width: 92%; }
      .title-wrap p { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="logo" aria-hidden="true">🍽️</div>
      <div class="title-wrap">
        <h1>오늘 뭐 먹지?</h1>
        <p>아침부터 안주까지 단어 하나로 추천
          <span class="count-badge">178가지 메뉴</span>
        </p>
      </div>
      <button class="reset-btn" id="resetBtn" type="button">처음부터</button>
    </header>

    <nav class="meal-tabs" aria-label="식사 시간 빠른 선택">
      <button type="button" data-word="아침">🌅 아침</button>
      <button type="button" data-word="점심">☀️ 점심</button>
      <button type="button" data-word="저녁">🌆 저녁</button>
      <button type="button" data-word="야식">🌙 야식</button>
      <button type="button" data-word="간식">🍰 간식</button>
      <button type="button" data-word="안주">🍺 안주</button>
    </nav>

    <section class="chat" id="chat" aria-live="polite"></section>

    <footer class="composer">
      <form class="input-wrap" id="chatForm">
        <input
          id="userInput"
          type="text"
          autocomplete="off"
          placeholder="단어만 입력해도 돼요: 매운, 국물, 맥주, 달달, 고기"
          aria-label="메시지 입력"
        />
        <button class="send-btn" type="submit" aria-label="전송">➜</button>
      </form>
      <div class="hint">완전한 문장이 아니어도 됩니다. 여러 단어도 가능해요: “저녁 매운 국물”</div>
    </footer>
  </main>

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[ch]));
    }

    function addMessage(text, sender = "bot", html = false) {
      const row = document.createElement("div");
      row.className = `message-row ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${sender}`;
      html ? bubble.innerHTML = text : bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showQuickReplies(items) {
      const wrap = document.createElement("div");
      wrap.className = "quick-replies";

      items.forEach(label => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", () => {
          const clean = label.replace(/^[^\p{L}\p{N}]+/u, "").trim();
          handleUserMessage(clean);
          wrap.remove();
        });
        wrap.appendChild(button);
      });

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function parseBudget(text) {
      const tenThousand = text.match(/(\d+(?:\.\d+)?)\s*만\s*원?/);
      if (tenThousand) return Math.round(parseFloat(tenThousand[1]) * 10000);

      const won = text.match(/(\d{4,6})\s*원?/);
      if (won) return parseInt(won[1], 10);

      if (/만원\s*(이하|안|내)|1만\s*(이하|안|내)/.test(text)) return 10000;
      if (/저렴|가성비|싸게/.test(text)) return 8000;
      return null;
    }

    function findCanonicalWord(token) {
      for (const [canonical, variants] of Object.entries(synonymGroups)) {
        if (variants.some(variant => token.includes(variant) || variant.includes(token))) {
          return canonical;
        }
      }
      return token;
    }

    function tokenize(text) {
      return text
        .toLowerCase()
        .replace(/[^가-힣a-z0-9\s]/g, " ")
        .split(/\s+/)
        .map(word => word.trim())
        .filter(word => word.length > 0 && !stopWords.has(word));
    }

    function updatePreferences(text) {
      const normalized = text.toLowerCase().replace(/\s+/g, " ").trim();
      const rawTokens = tokenize(normalized);
      const canonicalTokens = [...new Set(rawTokens.map(findCanonicalWord))];

      state.queryWords = canonicalTokens;
      state.tags = [];

      const budget = parseBudget(normalized);
      if (budget) state.budget = budget;

      for (const mealTime of ["아침", "점심", "저녁", "야식", "간식", "안주"]) {
        const variants = synonymGroups[mealTime];
        if (variants.some(word => normalized.includes(word))) {
          state.mealTime = mealTime;
          break;
        }
      }

      for (const [category, words] of Object.entries(categoryKeywords)) {
        if (words.some(word => normalized.includes(word))) {
          state.category = category;
          break;
        }
      }

      if (/채식|비건|고기\s*없이/.test(normalized)) state.vegetarian = true;
      if (/채식\s*아니|고기\s*좋|고기\s*먹/.test(normalized)) state.vegetarian = false;

      if (/아주\s*맵|매운맛|불닭|마라|얼얼/.test(normalized)) state.spicy = 5;
      else if (/매운|매콤|얼큰|칼칼/.test(normalized)) state.spicy = 4;
      else if (/순한|안\s*맵|담백/.test(normalized)) state.spicy = 0;

      if (/가볍|건강|다이어트|부담\s*없/.test(normalized)) state.heavy = 1;
      else if (/든든|푸짐|배부르게|보양/.test(normalized)) state.heavy = 5;

      const usefulTags = [
        "국물", "고기", "해산물", "면", "밥", "빵", "달달", "바삭",
        "건강", "든든", "치즈", "커피", "맥주", "소주", "와인", "막걸리"
      ];

      state.tags = usefulTags.filter(tag =>
        synonymGroups[tag]?.some(word => normalized.includes(word))
      );
    }

    function searchableText(menu) {
      return [
        menu.name,
        menu.category,
        ...menu.times,
        ...menu.tags
      ].join(" ").toLowerCase();
    }

    function scoreMenu(menu) {
      let score = Math.random() * 1.2;
      const haystack = searchableText(menu);

      if (state.mealTime) {
        score += menu.times.includes(state.mealTime) ? 8 : -4;
      }

      if (state.budget !== null) {
        score += menu.price <= state.budget ? 5 : -10;
        score += Math.max(0, 2 - Math.abs(state.budget - menu.price) / 7000);
      }

      if (state.category) {
        score += menu.category === state.category ? 7 : -1;
      }

      if (state.spicy !== null) {
        score += 5 - Math.abs(menu.spicy - state.spicy) * 1.4;
      }

      if (state.heavy !== null) {
        score += 4 - Math.abs(menu.heavy - state.heavy);
      }

      if (state.vegetarian) {
        score += menu.vegetarian ? 7 : -30;
      }

      state.tags.forEach(tag => {
        const variants = synonymGroups[tag] || [tag];
        if (variants.some(word => haystack.includes(word)) || haystack.includes(tag)) {
          score += 5;
        }
      });

      state.queryWords.forEach(word => {
        const variants = synonymGroups[word] || [word];
        const matched = variants.some(variant => haystack.includes(variant)) || haystack.includes(word);
        if (matched) score += 6;

        if (menu.name.toLowerCase().includes(word)) score += 9;
      });

      if (state.excluded.includes(menu.name)) score -= 50;
      return score;
    }

    function recommend(count = 5) {
      let candidates = menus.filter(menu => !state.excluded.includes(menu.name));

      if (candidates.length < count) {
        state.excluded = [];
        candidates = [...menus];
      }

      const selected = candidates
        .map(menu => ({ menu, score: scoreMenu(menu) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, count)
        .map(item => item.menu);

      state.lastMenus = selected;
      return selected;
    }

    function preferenceSummary() {
      const parts = [];

      if (state.mealTime) parts.push(state.mealTime);
      if (state.category) parts.push(state.category);
      if (state.budget) parts.push(`${state.budget.toLocaleString()}원 이하`);
      if (state.spicy === 5) parts.push("아주 매운맛");
      else if (state.spicy === 4) parts.push("매운맛");
      else if (state.spicy === 0) parts.push("순한맛");
      if (state.heavy === 1) parts.push("가볍게");
      else if (state.heavy === 5) parts.push("든든하게");
      if (state.vegetarian) parts.push("채식");
      parts.push(...state.tags);
      parts.push(...state.queryWords.filter(word => !parts.includes(word)));

      return [...new Set(parts)].length
        ? [...new Set(parts)].join(" · ")
        : "무작위 추천";
    }

    function renderRecommendation(recommendedMenus) {
      const spicyLabels = ["안 매움", "순한 맛", "약간 매콤", "매콤", "매움", "아주 매움"];

      const cards = recommendedMenus.map((menu, index) => `
        <div class="menu-card">
          <strong>${index + 1}. ${escapeHtml(menu.name)}</strong>
          <div class="menu-meta">
            ${escapeHtml(menu.category)} · 약 ${menu.price.toLocaleString()}원 ·
            ${spicyLabels[menu.spicy]} · ${"●".repeat(menu.heavy)}${"○".repeat(5 - menu.heavy)}
          </div>
          <div class="tag-list">
            ${menu.times.map(time => `<span class="tag">${escapeHtml(time)}</span>`).join("")}
            ${menu.tags.slice(0, 4).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join("")}
          </div>
        </div>
      `).join("");

      const html = `
        조건과 단어에 맞춰 5가지를 골랐어요.
        <div class="menu-grid">${cards}</div>
        <div class="matched">반영한 단어: ${escapeHtml(preferenceSummary())}</div>
      `;

      addMessage(html, "bot", true);
      showQuickReplies(["✨ 다른 메뉴", "🌶️ 매운", "🍲 국물", "🥗 건강", "🍺 맥주", "🔄 초기화"]);
    }

    function resetState(showGreeting = true) {
      state.queryWords = [];
      state.mealTime = null;
      state.budget = null;
      state.spicy = null;
      state.heavy = null;
      state.vegetarian = false;
      state.category = null;
      state.tags = [];
      state.excluded = [];
      state.lastMenus = [];
      chat.innerHTML = "";

      if (showGreeting) {
        addMessage(
          "아침, 점심, 저녁, 야식, 간식, 안주까지 골라드려요.\n" +
          "문장으로 쓰지 않아도 됩니다. “매운”, “국물”, “맥주”, “달달”처럼 단어만 입력해 보세요."
        );
        showQuickReplies(["🌅 아침", "☀️ 점심", "🌆 저녁", "🌙 야식", "🍰 간식", "🍺 안주"]);
      }
    }

    function handleUserMessage(rawText) {
      const text = rawText.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      if (/^(처음부터|초기화|조건 초기화|리셋)/.test(text)) {
        resetState(false);
        addMessage("조건을 초기화했어요. 단어 하나만 입력해도 추천해 드릴게요.");
        showQuickReplies(["🌅 아침", "☀️ 점심", "🌆 저녁", "🌙 야식", "🍰 간식", "🍺 안주"]);
        return;
      }

      if (/다른|또|다시|별로/.test(text)) {
        state.lastMenus.forEach(menu => {
          if (!state.excluded.includes(menu.name)) state.excluded.push(menu.name);
        });
        renderRecommendation(recommend(5));
        return;
      }

      if (/고마|좋아|오케이|먹을게/.test(text)) {
        addMessage("좋아요! 맛있게 드세요 😋");
        return;
      }

      updatePreferences(text);
      renderRecommendation(recommend(5));
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      handleUserMessage(input.value);
    });

    resetBtn.addEventListener("click", () => resetState(true));

    document.querySelectorAll(".meal-tabs button").forEach(button => {
      button.addEventListener("click", () => handleUserMessage(button.dataset.word));
    });

    resetState(true);
  </script>
</body>
</html>
